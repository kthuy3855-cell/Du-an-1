<!DOCTYPE html>
<html>
<head>
    <title>Trang cá nhân</title>
    <meta charset="utf-8">
    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        .banner img {
            width: 100%;
        }

        .slogan {
            margin-top: 20px;
        }

        .slogan div {
            display: inline-block;
            width: 30%;
            color: blue;
            font-size: 20px;
        }

        .profile img {
            width: 200px;
            margin-top: 20px;
        }

        .intro {
            margin-top: 20px;
            font-size: 18px;
        }

        .chantrang {
            margin-top: 20px;
            background-color: cyan;
            padding: 10px;
        }
    </style>
</head>

<body>

    <!-- Ảnh trường -->
    <div class="banner">
        <img src="truong.jpg" alt="Trường học">
    </div>

    <!-- Slogan -->
    <div class="slogan">
        <div>Học hỏi</div>
        <div>Chia sẻ</div>
        <div>Sáng tạo</div>
    </div>

    <!-- Ảnh cá nhân -->
    <div class="profile">
        <img src="banthan.jpg" alt="Ảnh cá nhân">
        <h2>Cù Thúy Kiều</h2>
    </div>

    <!-- Giới thiệu -->
    <div class="intro">
        <ul style="list-style: none;">
            <li>Họ tên: Cù Thúy Kiều</li>
            <li>Lớp: 12A5</li>
            <li>Tính cách: Hòa đồng, thân thiện</li>
            <li>Sở thích: Học hỏi, chia sẻ, sáng tạo</li>
        </ul>
    </div>

    <!-- Chân trang -->
    <div class="chantrang">
        <p>&copy; 2026 Cù Thúy Kiều</p>
    </div>

</body>
</html>
